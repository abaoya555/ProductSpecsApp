name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          cd ProductSpecsApp

          xcodebuild \
          -scheme ProductSpecsApp \
          -project ProductSpecsApp.xcodeproj \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

      - name: Create IPA
        run: |
          mkdir Payload

          cp -r ProductSpecsApp/build/Release-iphoneos/ProductSpecsApp.app Payload/

          zip -r ProductSpecsApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProductSpecsApp-IPA
          path: ProductSpecsApp.ipa
