name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build App
        run: |
          cd ProductSpecsApp
          xcodebuild \
          -scheme ProductSpecsApp \
          -project ProductSpecsApp.xcodeproj \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          -derivedDataPath build \
          build

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ProductSpecsApp/build -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r ProductSpecsApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProductSpecsApp-IPA
          path: ProductSpecsApp.ipa
